version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "recette"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
       - dependency-name: "eslint*"
       - dependency-name: "@gouvfr/dsfr"
         update-types: 
          - "version-update:semver-patch" 
          - "version-update:semver-minor"
    groups:
      minor-and-patch:
        update-types:
          - "patch"
          - "minor"
